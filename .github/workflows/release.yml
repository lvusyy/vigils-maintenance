name: Cross-platform Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  bundle:
    name: Bundle ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            os: windows-latest
            bundles: nsis
            artifact_path: target/release/bundle/nsis/*.exe
          - platform: linux-x86_64
            os: ubuntu-24.04
            bundles: deb,appimage
            artifact_path: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage
          - platform: macos
            os: macos-14
            bundles: dmg
            artifact_path: target/release/bundle/dmg/*.dmg

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build native bundles
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Upload native bundles
        uses: actions/upload-artifact@v4
        with:
          name: vigils-maintenance-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: bundle
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          pattern: vigils-maintenance-*
          path: release-assets
          merge-multiple: true

      - name: Collect release assets
        shell: bash
        run: |
          mkdir release-upload
          while IFS= read -r -d '' file; do
            target="release-upload/$(basename "$file")"
            if [[ -e "$target" ]]; then
              echo "Duplicate release asset: $(basename "$file")" >&2
              exit 1
            fi
            cp "$file" "$target"
          done < <(find release-assets -type f -print0)
          test -n "$(find release-upload -maxdepth 1 -type f -print -quit)"

      - name: Generate checksums
        shell: bash
        run: |
          cd release-upload
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed -E 's# [ *]\./#  #' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "Vigils Maintenance $tag" \
              --generate-notes
          find release-upload -maxdepth 1 -type f -print0 \
            | xargs -0 gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber
